name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.6

      - name: Unzip Android project
        run: unzip -o germanai-android-auth-themefixed.zip

      - name: Show project files
        run: |
          echo "ROOT:"
          ls -la
          echo ""
          echo "PROJECT:"
          ls -la germanai-android
          echo ""
          echo "APP:"
          ls -la germanai-android/app

      - name: Build Debug APK
        id: build_apk
        working-directory: germanai-android
        continue-on-error: true
        run: |
          gradle assembleDebug --stacktrace --info --no-daemon 2>&1 | tee build.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
          exit 0

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: germanai-android/build.log
          if-no-files-found: error

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: germanai-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore

      - name: Fail if build failed
        if: steps.build_apk.outputs.exit_code != '0'
        run: |
          echo "APK build failed. Download the build-log artifact and inspect the real Gradle error."
          exit 1
